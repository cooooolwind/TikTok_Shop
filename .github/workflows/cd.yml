name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_ci:
        description: '跳过 CI 检查 (紧急修复)'
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
  ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
  BACKEND_IMAGE: ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/aigc-backend
  FRONTEND_IMAGE: ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/aigc-frontend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    if: ${{ !inputs.skip_ci }}
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: [ci]
    if: ${{ !cancelled() && (needs.ci.result == 'success' || needs.ci.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Aliyun credentials
        uses: aliyun/configure-aliyun-credentials-action@v1
        with:
          role-to-assume: ${{ secrets.ALIYUN_ROLE_ARN }}
          oidc-provider-arn: ${{ secrets.ALIYUN_OIDC_PROVIDER_ARN }}
          role-session-name: github-actions-build

      - name: Login to Alibaba Cloud ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login \
            ${{ env.ACR_REGISTRY }} \
            --username "${{ secrets.ACR_USERNAME }}" \
            --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract backend metadata
        id: meta_backend
        uses: docker/metadata-action@v5.6.1
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend.Dockerfile
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract frontend metadata
        id: meta_frontend
        uses: docker/metadata-action@v5.6.1
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Logout from ACR
        if: always()
        run: docker logout ${{ env.ACR_REGISTRY }}

  deploy:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Copy deployment files to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          source: "docker-compose.prod.yml,scripts/deploy.sh"
          target: /opt/aigc-platform/

      - name: Deploy on ECS
        uses: appleboy/ssh-action@v1.0.3
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
          ACR_REGISTRY: ${{ env.ACR_REGISTRY }}
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script_stop: true
          envs: ACR_USERNAME,ACR_PASSWORD,ACR_NAMESPACE,ACR_REGISTRY
          script: |
            set -e
            cd /opt/aigc-platform

            echo "$ACR_PASSWORD" | docker login \
              $ACR_REGISTRY \
              --username "$ACR_USERNAME" \
              --password-stdin

            export BACKEND_IMAGE="$ACR_REGISTRY/$ACR_NAMESPACE/aigc-backend:latest"
            export FRONTEND_IMAGE="$ACR_REGISTRY/$ACR_NAMESPACE/aigc-frontend:latest"

            echo "Pull latest images..."
            docker compose -f docker-compose.prod.yml pull backend frontend

            echo "Rolling update..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "Cleanup old images..."
            docker image prune -a -f || true

            echo "Waiting for services..."
            sleep 10

            echo "Backend health check..."
            curl -fsS http://localhost:3000/api/v1/health \
              && echo "Backend OK" \
              || (echo "Backend health check failed" && exit 1)

            echo "Frontend health check..."
            curl -fsS http://localhost/ \
              && echo "Frontend OK" \
              || (echo "Frontend health check failed" && exit 1)

            docker logout $ACR_REGISTRY
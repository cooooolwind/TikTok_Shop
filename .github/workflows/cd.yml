name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_ci:
        description: '跳过 CI 检查 (紧急修复)'
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
  ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
  BACKEND_IMAGE: ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/aigc-backend
  FRONTEND_IMAGE: ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/aigc-frontend

jobs:
  ci:
    if: ${{ !inputs.skip_ci }}
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: [ci]
    if: ${{ !cancelled() && (needs.ci.result == 'success' || needs.ci.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v6

      - name: Configure Aliyun credentials
        uses: aliyun/configure-aliyun-credentials-action@v1
        with:
          role-to-assume: ${{ secrets.ALIYUN_ROLE_ARN }}
          oidc-provider-arn: ${{ secrets.ALIYUN_OIDC_PROVIDER_ARN }}
          role-session-name: 'github-actions-build'

      - name: Log in to Alibaba Cloud ACR
        uses: aliyun/acr-login@v1
        with:
          login-server: ${{ env.ACR_REGISTRY }}
          region-id: cn-hangzhou
          access-key-id: ${{ env.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          access-key-secret: ${{ env.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
          security-token: ${{ env.ALIBABA_CLOUD_SECURITY_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (backend)
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend.Dockerfile
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (frontend)
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v6

      - name: Configure Aliyun credentials
        uses: aliyun/configure-aliyun-credentials-action@v1
        with:
          role-to-assume: ${{ secrets.ALIYUN_ROLE_ARN }}
          oidc-provider-arn: ${{ secrets.ALIYUN_OIDC_PROVIDER_ARN }}
          role-session-name: 'github-actions-deploy'

      - name: Log in to Alibaba Cloud ACR
        uses: aliyun/acr-login@v1
        with:
          login-server: ${{ env.ACR_REGISTRY }}
          region-id: cn-hangzhou
          access-key-id: ${{ env.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          access-key-secret: ${{ env.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
          security-token: ${{ env.ALIBABA_CLOUD_SECURITY_TOKEN }}

      - name: Extract Docker Credentials for ECS
        id: docker-creds
        run: |
          AUTH=$(jq -r '.auths["${{ env.ACR_REGISTRY }}"].auth' ${DOCKER_CONFIG:-~/.docker}/config.json)
          USER=$(echo "$AUTH" | base64 -d | cut -d: -f1)
          PASS=$(echo "$AUTH" | base64 -d | cut -d: -f2)
          echo "username=$USER" >> $GITHUB_OUTPUT
          echo "password=$PASS" >> $GITHUB_OUTPUT

      - name: Copy deployment files to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          source: 'docker-compose.prod.yml,scripts/deploy.sh'
          target: '/opt/aigc-platform/'

      - name: Deploy on ECS
        uses: appleboy/ssh-action@v1.0.3
        env:
          ACR_USERNAME: ${{ steps.docker-creds.outputs.username }}
          ACR_PASSWORD: ${{ steps.docker-creds.outputs.password }}
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script_stop: true
          envs: ACR_USERNAME,ACR_PASSWORD,ACR_NAMESPACE,ACR_REGISTRY,$ACR_INTERNAL_REGISTRY
          script: |
            cd /opt/aigc-platform

            # 登录阿里云 ACR
            docker login $ACR_INTERNAL_REGISTRY

            # 拉取最新镜像
            export BACKEND_IMAGE="$ACR_INTERNAL_REGISTRY/$ACR_NAMESPACE/aigc-backend:latest"
            export FRONTEND_IMAGE="$ACR_INTERNAL_REGISTRY/$ACR_NAMESPACE/aigc-frontend:latest"

            docker compose -f docker-compose.prod.yml pull

            # 滚动更新
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # 清理旧镜像
            docker image prune -af || true

            # 健康检查
            sleep 5
            curl -f http://localhost:3000/api/v1/health && echo "Backend OK" || echo "Backend check failed"
            curl -f http://localhost/ && echo "Frontend OK" || echo "Frontend check failed"

            docker logout $ACR_REGISTRY

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
    outputs:
      backend:
        description: "Backend affected status"
        value: ${{ jobs.detect-affected.outputs.backend }}
      frontend:
        description: "Frontend affected status"
        value: ${{ jobs.detect-affected.outputs.frontend }}
      shared-types:
        description: "Shared types affected status"
        value: ${{ jobs.detect-affected.outputs['shared-types'] }}
      any_affected:
        description: "Any package affected status"
        value: ${{ jobs.detect-affected.outputs.any_affected }}
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: 检测受影响的 packages
  # ──────────────────────────────────────────────
  detect-affected:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.affected.outputs.backend }}
      frontend: ${{ steps.affected.outputs.frontend }}
      shared-types: ${{ steps.affected.outputs['shared-types'] }}
      any_affected: ${{ steps.affected.outputs.any_affected }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Detect affected packages
        id: affected
        run: |
          # 使用 turbo --affected --dry-run 获取受影响的 packages
          AFFECTED=$(pnpm turbo build lint test typecheck --affected --dry-run=json 2>/dev/null | jq -r '.packages[]' | sort -u)

          echo "Affected packages: $AFFECTED"

          # 设置每个 package 的 affected 状态
          if echo "$AFFECTED" | grep -q "@aigc/backend"; then
            echo "backend=true" >> $GITHUB_OUTPUT
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi

          if echo "$AFFECTED" | grep -q "@aigc/frontend"; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi

          if echo "$AFFECTED" | grep -q "@aigc/shared-types"; then
            echo "shared-types=true" >> $GITHUB_OUTPUT
          else
            echo "shared-types=false" >> $GITHUB_OUTPUT
          fi

          # 判断是否有任何 package 受影响
          if [ -z "$AFFECTED" ] || [ "$AFFECTED" = "//" ]; then
            echo "any_affected=false" >> $GITHUB_OUTPUT
          else
            echo "any_affected=true" >> $GITHUB_OUTPUT
          fi

  # ──────────────────────────────────────────────
  # Stage 2: Lint & Typecheck (只跑 affected)
  # ──────────────────────────────────────────────
  lint-and-typecheck:
    needs: [detect-affected]
    if: needs.detect-affected.outputs.any_affected == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Lint affected packages
        run: pnpm turbo lint --affected

      - name: Typecheck affected packages
        run: pnpm turbo typecheck --affected

  # ──────────────────────────────────────────────
  # Stage 3: Test Backend (条件执行)
  # ──────────────────────────────────────────────
  test-backend:
    needs: [detect-affected]
    if: >-
      needs.detect-affected.outputs.backend == 'true' ||
      needs.detect-affected.outputs['shared-types'] == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: aigc
          POSTGRES_PASSWORD: aigc_test
          POSTGRES_DB: aigc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aigc -d aigc_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: aigc
      POSTGRES_PASSWORD: aigc_test
      POSTGRES_DB: aigc_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      MOCK_MODE: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo test --filter=@aigc/backend

  # ──────────────────────────────────────────────
  # Stage 4: Test Frontend (条件执行)
  # ──────────────────────────────────────────────
  test-frontend:
    needs: [detect-affected]
    if: >-
      needs.detect-affected.outputs.frontend == 'true' ||
      needs.detect-affected.outputs['shared-types'] == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo test --filter=@aigc/frontend

  # ──────────────────────────────────────────────
  # Stage 5: Build (仅 affected packages)
  # ──────────────────────────────────────────────
  build:
    needs: [detect-affected, lint-and-typecheck, test-backend, test-frontend]
    if: >-
      !cancelled() &&
      !contains(needs.*.result, 'failure') &&
      needs.detect-affected.outputs.any_affected == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build --affected


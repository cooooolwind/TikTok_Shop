version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aigc-postgres-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aigc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aigc_dev_2024}
      POSTGRES_DB: ${POSTGRES_DB:-aigc_platform}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aigc} -d ${POSTGRES_DB:-aigc_platform}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aigc-redis-dev
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
  redis_dev_data:
